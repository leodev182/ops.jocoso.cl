<table class="trending-table">
  <thead>
    <tr>
      <th>Producto</th>
      <th>Estado</th>
      <th>Vistas</th>
      <th></th>
    </tr>
  </thead>
  <tbody>
    @for (product of products; track product.id) {
      <tr>
        <td>{{ product.title }}</td>
        <td>
          <span class="badge badge--{{ product.status | lowercase }}">
            {{ product.status }}
          </span>
        </td>
        <td>{{ product.views }}</td>
        <td>
          <a [routerLink]="['/products', product.id]" class="link">Ver</a>
        </td>
      </tr>
    } @empty {
      <tr>
        <td colspan="4" class="trending-table__empty">
          Sin datos para el período seleccionado.
        </td>
      </tr>
    }
  </tbody>
</table>
