<table class="movements-table">
  <thead>
    <tr>
      <th>Cantidad</th>
      <th>Fuente</th>
      <th>Tipo</th>
      <th>Referencia</th>
      <th>Fecha</th>
    </tr>
  </thead>
  <tbody>
    @for (m of movements; track m.id) {
      <tr>
        <td>
          <span
            class="qty"
            [class.qty--positive]="m.quantity > 0"
            [class.qty--negative]="m.quantity < 0"
          >
            {{ m.quantity > 0 ? '+' : '' }}{{ m.quantity }}
          </span>
        </td>
        <td>{{ m.source }}</td>
        <td>{{ m.referenceType }}</td>
        <td>{{ m.referenceId ?? '—' }}</td>
        <td>{{ m.createdAt | date:'short' }}</td>
      </tr>
    } @empty {
      <tr>
        <td colspan="5" class="movements-table__empty">Sin movimientos registrados.</td>
      </tr>
    }
  </tbody>
</table>
